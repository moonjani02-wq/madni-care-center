<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Your shopping cart" />
    <title>Madni Care Center • Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="cart">
    <header class="topbar">
      <div class="container">
        <nav class="nav" aria-label="Main navigation">
          <a class="brand" href="index.html">
            <span class="logo" aria-hidden="true"></span>
            <span data-biz-name>Your Business Name</span>
          </a>
          <div class="spacer"></div>
          <div class="nav-links">
            <a data-nav data-nav="home" href="index.html">Home</a>
            <a data-nav data-nav="products" href="products.html">Shop</a>
            <a data-nav data-nav="about" href="about.html">About</a>
            <a data-nav data-nav="contact" href="contact.html">Contact</a>
            <a class="pill" href="cart.html" aria-label="Cart">
              Cart <span class="badge" data-cart-count>0</span>
            </a>
          </div>
        </nav>
      </div>
    </header>

    <div class="page-cover" aria-hidden="true"></div>

    <main class="section">
      <div class="container">
        <div class="row" style="margin-bottom:0;">
          <div class="stack" style="gap:4px;">
            <h1 style="margin:0; letter-spacing:-0.4px;">Your cart</h1>
            <p class="subhead" style="margin:0;">Update quantities, remove items, and proceed to checkout.</p>
          </div>
          <div class="spacer"></div>
          <a class="btn small" href="products.html">Continue shopping</a>
        </div>

        <div id="cartMount"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="stack" style="gap:4px;">
            <strong data-biz-name>Your Business Name</strong>
            <div class="tiny" data-biz-tagline>Modern wellness products crafted with care.</div>
          </div>
          <div class="spacer"></div>
          <div class="row">
            <a href="products.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>
        <div class="divider"></div>
        <div class="tiny">© <span id="year"></span> <span data-biz-name>Your Business Name</span>.</div>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span data-toast-text>Updated</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="app.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
