<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Browse products" />
    <title>Madni Care Center • Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="theme-color" content="#173b2d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Madni Care" />
  </head>
  <body data-page="products">
    <header class="topbar">
      <div class="container">
        <nav class="nav" aria-label="Main navigation">
          <a class="brand" href="index.html">
            <span class="logo" aria-hidden="true"></span>
            <span data-biz-name>Your Business Name</span>
          </a>
          <div class="spacer"></div>
          <div class="nav-links">
            <a data-nav data-nav="home" href="index.html">Home</a>
            <a data-nav data-nav="products" href="products.html">Shop</a>
            <a data-nav data-nav="about" href="about.html">About</a>
            <a data-nav data-nav="contact" href="contact.html">Contact</a>
            <a class="pill" href="cart.html" aria-label="Cart">
              Cart <span class="badge" data-cart-count>0</span>
            </a>
          </div>
        </nav>
      </div>
    </header>

    <div class="page-cover" aria-hidden="true"></div>

    <main class="section">
      <div class="container">
        <div class="row" style="margin-bottom:0;">
          <div class="stack" style="gap:4px;">
            <h1 style="margin:0; letter-spacing:-0.4px;">Shop</h1>
            <p class="subhead" style="margin:0;">Search, filter, and sort products. Tap a product to see details and reviews.</p>
          </div>
          <div class="spacer"></div>
          <div class="pill" aria-label="Results">
            <span id="resultsCount">0 products</span>
          </div>
          <a class="btn small" href="add-product.html" aria-label="Add a product">Add product</a>
        </div>

        <div class="card pad">
          <div class="filters">
            <div class="field" style="flex: 1; min-width: 220px;">
              <label for="search">Search</label>
              <input class="input" id="search" placeholder="Search products..." />
            </div>
            <div class="field" style="min-width: 180px;">
              <label for="category">Category</label>
              <select class="input" id="category">
                <option>All</option>
              </select>
            </div>
            <div class="field" style="min-width: 180px;">
              <label for="subcategory">Subcategory</label>
              <select class="input" id="subcategory" disabled>
                <option value="All">All</option>
              </select>
            </div>
            <div class="field" style="min-width: 190px;">
              <label for="sort">Sort</label>
              <select class="input" id="sort">
                <option value="featured">Featured</option>
                <option value="rating">Top rated</option>
                <option value="price-asc">Price: low to high</option>
                <option value="price-desc">Price: high to low</option>
              </select>
            </div>
          </div>
        </div>

        <div style="height:0;" aria-hidden="true"></div>
        <div class="grid" id="productsGrid" aria-label="Products grid"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="stack" style="gap:4px;">
            <strong data-biz-name>Your Business Name</strong>
            <div class="tiny" data-biz-tagline>Modern wellness products crafted with care.</div>
          </div>
          <div class="spacer"></div>
          <div class="row">
            <a href="products.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>
        <div class="divider"></div>
        <div class="tiny">© <span id="year"></span> <span data-biz-name>Your Business Name</span>.</div>
      </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span data-toast-text>Updated</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="app.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
